name: ETL Update

on:
  schedule:
    - cron: '0 6 1 * *'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install poetry && poetry install --no-interaction

      - name: Run ingesta pipeline
        run: poetry run python -m src.ingesta.main

      - name: Run transformacion pipeline
        run: poetry run python -m src.transformacion.main

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "data: actualizacion automatica de datos"
          file_pattern: "datos/processed/**"
